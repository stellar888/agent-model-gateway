api_version: agents.example.io/v1
kind: Agent

metadata:
  name: openai-pr-triage-lite
  version: 0.1.0
  owner: developer-platform
  description: Quickly triages a pull request using a lower-cost OpenAI profile.

spec:
  model_profile: coding_fast_openai

  instructions:
    system_file: prompt.md

  capabilities:
    required:
      tool_calling: false
      structured_output: true
      minimum_context_window: 32000

  tools: []

  output:
    schema_file: output.schema.json

  policies:
    max_iterations: 1
    max_cost_usd: 0.25
    writes_allowed: false

  customization:
    append_instructions: allowed
    settings:
      severity_threshold: allowed
    model_profile: locked
    tools_add: locked

  settings:
    severity_threshold: medium
